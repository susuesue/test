name: RAG项目CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1️⃣ 拉取代码
        uses: actions/checkout@v3
      
      - name: 2️⃣ 设置Python环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: 3️⃣ 显示项目结构
        run: |
          echo "当前目录下的文件："
          ls -la
          echo "✅ CI配置成功，但没有安装依赖"
