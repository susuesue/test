name: RAG项目CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1️⃣ 拉取代码
        uses: actions/checkout@v3
      
      - name: 2️⃣ 设置Python环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: 3️⃣ 显示项目结构
        run: |
          echo "当前目录下的文件："
          ls -la
          echo "✅ CI配置成功，但没有安装依赖"
      - name: 检查代码风格
        run: |
          pip install flake8
          # 显示问题但不阻止CI
          flake8 . --max-line-length=120 --exit-zero
          echo "✅ 代码检查完成（仅显示问题）"
      - name: 运行测试
        run: |
          if [ -d "tests" ]; then
            pip install pytest
            pytest tests/ -v
          else
            echo "没有tests文件夹，跳过测试"
            exit 0  # 正常退出，不报错
          fi
